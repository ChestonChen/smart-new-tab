<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="styles/newtab.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path d="M3 5a2 2 0 0 1 2-2h6v8H3V5zm10-2h6a2 2 0 0 1 2 2v3h-8V3zM3 13h8v8H5a2 2 0 0 1-2-2v-6zm10-3h8v9a2 2 0 0 1-2 2h-6V10z"
                  fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1>Smart New Tab</h1>
          <p class="brand-sub" id="brand-sub">Loading your open tabs…</p>
        </div>
      </div>

      <div class="topbar-right">
        <div class="search">
          <input id="search-input" type="text" placeholder="Search title, URL, or domain…" autocomplete="off">
          <kbd>/</kbd>
        </div>
        <button class="icon-btn" id="refresh-btn" title="Refresh">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 6V3L8 7l4 4V8a4 4 0 1 1-4 4H6a6 6 0 1 0 6-6z"/></svg>
        </button>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19.14 12.94a7.03 7.03 0 0 0 .05-1.88l2.11-1.65-2-3.46-2.49.99a7 7 0 0 0-1.63-.94L14.8 3h-4l-.38 2.5a7 7 0 0 0-1.63.94l-2.49-.99-2 3.46 2.11 1.65a7.03 7.03 0 0 0 0 1.88l-2.11 1.65 2 3.46 2.49-.99a7 7 0 0 0 1.63.94L9.2 21h4l.38-2.5a7 7 0 0 0 1.63-.94l2.49.99 2-3.46-2.11-1.65zM12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5z"/></svg>
        </button>
      </div>
    </header>

    <section class="stats" id="stats-row">
      <div class="stat-card stat-total"><span class="stat-label">Tabs</span><span class="stat-value" id="stat-tabs">–</span></div>
      <div class="stat-card stat-windows"><span class="stat-label">Windows</span><span class="stat-value" id="stat-windows">–</span></div>
      <div class="stat-card stat-domains"><span class="stat-label">Domains</span><span class="stat-value" id="stat-domains">–</span></div>
      <div class="stat-card stat-dupes"><span class="stat-label">Duplicates</span><span class="stat-value" id="stat-dupes">–</span></div>

      <div class="actions">
        <button class="primary-btn" id="dedupe-btn">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 7h-3V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h2v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 14V5h9v2H9a2 2 0 0 0-2 2v5H5zm14 6H9V9h10v11z"/></svg>
          Close duplicates
        </button>
        <select id="group-mode" class="select" title="Grouping mode">
          <option value="category">Group by category</option>
          <option value="domain">Group by domain</option>
          <option value="window">Group by window</option>
        </select>
      </div>
    </section>

    <main id="board" class="board">
      <div class="empty" id="empty-state" hidden>
        <div class="empty-emoji">🎉</div>
        <h2>All clean!</h2>
        <p>No open tabs match the current filter.</p>
      </div>
    </main>

    <footer class="footer">
      <span id="ai-status">AI grouping: <b id="ai-status-value">off</b></span>
      <span class="dot">·</span>
      <a href="#" id="open-options">Settings</a>
      <span class="dot">·</span>
      <a href="https://github.com/" target="_blank" rel="noopener" id="repo-link">GitHub</a>
    </footer>
  </div>

  <template id="group-template">
    <section class="group">
      <span class="group-accent" aria-hidden="true"></span>
      <header class="group-head">
        <div class="group-title">
          <span class="group-emoji"></span>
          <h2 class="group-name"></h2>
          <span class="group-count"></span>
        </div>
        <div class="group-tools">
          <button class="link-btn group-collapse" title="Collapse">▾</button>
          <button class="link-btn group-close-all" title="Close all in this group">Close all</button>
        </div>
      </header>
      <div class="group-body">
        <ul class="tab-grid"></ul>
      </div>
    </section>
  </template>

  <template id="tab-template">
    <li class="tab-card" tabindex="0">
      <div class="tab-banner">
        <div class="tab-banner-overlay"></div>
        <span class="tab-emoji" aria-hidden="true"></span>
        <img class="tab-favicon" alt="" loading="lazy">
        <span class="tab-dupe-ribbon" hidden>×<span class="tab-dupe-count"></span></span>
        <div class="tab-actions">
          <button class="icon-btn tab-bookmark" title="Bookmark">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2z"/></svg>
          </button>
          <button class="icon-btn tab-close" title="Close">
            <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>
      <div class="tab-body">
        <div class="tab-title"></div>
        <div class="tab-sub">
          <span class="tab-domain"></span>
          <span class="tab-window-badge" hidden></span>
        </div>
      </div>
    </li>
  </template>

  <script src="scripts/newtab.js" type="module"></script>
</body>
</html>
