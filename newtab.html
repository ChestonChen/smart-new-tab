<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="styles/newtab.css">
</head>
<body>
  <div class="app">
    <!-- Compact top bar: search + actions, sits in the top-right corner -->
    <header class="topbar">
      <div class="topbar-actions">
        <div class="search">
          <input id="search-input" type="text" placeholder="Search…" autocomplete="off">
          <kbd>/</kbd>
        </div>
        <button class="icon-btn" id="refresh-btn" title="Refresh">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 6V3L8 7l4 4V8a4 4 0 1 1-4 4H6a6 6 0 1 0 6-6z"/></svg>
        </button>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19.14 12.94a7.03 7.03 0 0 0 .05-1.88l2.11-1.65-2-3.46-2.49.99a7 7 0 0 0-1.63-.94L14.8 3h-4l-.38 2.5a7 7 0 0 0-1.63.94l-2.49-.99-2 3.46 2.11 1.65a7.03 7.03 0 0 0 0 1.88l-2.11 1.65 2 3.46 2.49-.99a7 7 0 0 0 1.63.94L9.2 21h4l.38-2.5a7 7 0 0 0 1.63-.94l2.49.99 2-3.46-2.11-1.65zM12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5z"/></svg>
        </button>
      </div>
    </header>

    <!-- Greeting -->
    <section class="hero">
      <h1 class="greeting" id="greeting">Hello</h1>
      <p class="hero-date" id="hero-date"></p>
    </section>

    <!-- Section header: "Open tabs" + summary + bulk actions -->
    <section class="open-tabs-header">
      <div class="oth-left">
        <h2 class="oth-title">Open tabs</h2>
        <select id="group-mode" class="select-quiet" title="Grouping mode">
          <option value="domain">by site</option>
          <option value="category">by category</option>
          <option value="window">by window</option>
        </select>
      </div>
      <div class="oth-right">
        <span class="oth-stat" id="summary-stat">—</span>
        <button class="pill-btn pill-warn" id="dedupe-btn" hidden>
          <span id="dedupe-count">0</span> duplicates
        </button>
        <button class="pill-btn pill-danger" id="close-all-btn">
          Close all <span id="total-tab-count">0</span> tabs
        </button>
      </div>
    </section>

    <main id="board" class="board">
      <div class="empty" id="empty-state" hidden>
        <div class="empty-emoji">🎉</div>
        <h2>All clean!</h2>
        <p>No open tabs match the current filter.</p>
      </div>
    </main>

    <footer class="footer">
      <span id="ai-status">AI grouping: <b id="ai-status-value">off</b></span>
      <span class="dot">·</span>
      <a href="#" id="open-options">Settings</a>
      <span class="dot">·</span>
      <a href="https://github.com/" target="_blank" rel="noopener" id="repo-link">GitHub</a>
    </footer>
  </div>

  <template id="group-template">
    <section class="group">
      <header class="group-head">
        <div class="group-title-row">
          <h3 class="group-name"></h3>
          <span class="group-pill"><span class="group-count"></span><span class="group-count-label"> tabs open</span></span>
        </div>
      </header>
      <ul class="tab-list"></ul>
      <footer class="group-foot">
        <button class="group-close-all">
          <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
            <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
          <span class="group-close-label">Close all tabs</span>
        </button>
      </footer>
    </section>
  </template>

  <template id="tab-template">
    <li class="tab" tabindex="0">
      <img class="tab-favicon" alt="" loading="lazy">
      <div class="tab-text">
        <span class="tab-title"></span>
        <span class="tab-dupe" hidden>×<span class="tab-dupe-count"></span></span>
      </div>
      <div class="tab-actions">
        <button class="tab-icon-btn tab-bookmark" title="Bookmark">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2z"/></svg>
        </button>
        <button class="tab-icon-btn tab-close" title="Close">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </li>
  </template>

  <script src="scripts/newtab.js" type="module"></script>
</body>
</html>
